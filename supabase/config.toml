# Minimal Supabase local config — adjust project_id when linking remote
project_id = "vfswagwhjshjnmppptif"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

# Hosted project: mirror under Authentication → URL Configuration (bilago.dk + localhost for dev)
[auth]
site_url = "https://bilago.dk"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "https://bilago.dk/**",
  "https://www.bilago.dk/**",
]


[functions]
  [functions.verify_jwt]
  enabled = true

[functions.stripe-webhook]
verify_jwt = false

[functions.aiia-oauth-callback]
verify_jwt = false
