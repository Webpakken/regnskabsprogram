name: Trial reminders

# Daglig kørsel kl. ~07:00 Europe/Copenhagen (05:00 UTC året rundt).
# Sender de 3 påmindelses-mails til virksomheder hvis prøveperiode er udløbet uden betaling.
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: trial-reminders
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Supabase Edge Function
        env:
          CRON_SECRET: ${{ secrets.TRIAL_REMINDER_CRON_SECRET }}
        run: |
          set -euo pipefail
          response=$(curl -sS -o /tmp/body.json -w '%{http_code}' \
            -X POST \
            -H "x-bilago-trial-reminder: ${CRON_SECRET}" \
            https://vfswagwhjshjnmppptif.supabase.co/functions/v1/trial-reminders)
          echo "HTTP ${response}"
          cat /tmp/body.json
          echo
          if [ "${response}" != "200" ]; then
            echo "Edge function returned non-2xx" >&2
            exit 1
          fi
