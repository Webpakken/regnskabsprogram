# Auto-deployer edge-funktioner til Supabase ved push til main.
# Rodårsag til dagens fejl (webhook/chat/cvr-search kørte gammel eller manglende
# kode): edge-funktioner blev deployet manuelt, så produktion drev fra git.
# Denne workflow holder dem i sync med main automatisk.
#
# Frontend deployes separat til Hostinger via egen GitHub-integration — derfor
# håndterer denne workflow KUN edge-funktioner.
#
# Kræver GitHub-secret:
#   SUPABASE_ACCESS_TOKEN  – Supabase PAT (sbp_...) med adgang til projektet
#
# Edge-funktioners JWT-indstillinger styres af supabase/config.toml og
# respekteres automatisk af `supabase functions deploy`.
name: Deploy edge functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-functions-main
  cancel-in-progress: true

env:
  SUPABASE_PROJECT_REF: vfswagwhjshjnmppptif

jobs:
  deploy-functions:
    name: Edge functions → Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy alle edge-funktioner
        run: |
          set -euo pipefail
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            [ "$fn" = "_shared" ] && continue
            echo "::group::deploy $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done
